<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/css/shipment-order.css">
<script src="js/shipment-order.js"></script>
    <title>Document</title>
</head>
<body>

  <header>
    <h1>International Shipment</h1>
  </header>

  <div class="container">
    <h2>Shipment Details</h2>
    <form id="shipmentForm">
      <label for="origin">Origin Country:</label>
      <select id="origin" required>
        <option value="">Select Origin</option>
        <option value="India">India</option>
        <option value="USA">USA</option>
        <option value="UK">UK</option>
        <option value="China">China</option>
      </select>

      <label for="destination">Destination Country:</label>
      <select id="destination" required>
        <option value="">Select Destination</option>
        <option value="India">India</option>
        <option value="USA">USA</option>
        <option value="UK">UK</option>
        <option value="China">China</option>
      </select>

      <label for="weight">Package Weight (kg):</label>
      <input type="number" id="weight" placeholder="Enter weight" required>

      <button type="button" onclick="calculateShipment()">Calculate Cost</button>
    </form>

    <div class="result" id="result"></div>
  </div>



    
</body>
</html>
