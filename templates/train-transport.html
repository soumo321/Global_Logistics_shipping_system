<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maersk Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #fff;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 20px;
        }

        .logo-box {
            width: 35px;
            height: 35px;
            background: #4db5d9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            font-size: 14px;
            color: #333;
        }

        .nav-links span {
            cursor: pointer;
        }

        .actions button {
            padding: 8px 15px;
            margin-left: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .register {
            background: #eee;
        }

        .login {
            background: #4db5d9;
            color: #fff;
        }

        /* Hero */
        .hero {
            position: relative;
            height: 85vh;
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        .hero-content {
            position: absolute;
            top: 50%;
            left: 60px;
            transform: translateY(-50%);
            color: #fff;
            z-index: 2;
            max-width: 500px;
            animation: fadeIn 1.5s ease;
        }

        .hero-content h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .hero-content p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .hero-content button {
            padding: 12px 20px;
            background: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .features {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            font-size: 14px;
        }

        .bottom-curve {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #4db5d9;
            border-top-right-radius: 60px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(-50%);
            }
        }

        /* Responsive */
        @media(max-width:768px) {
            .nav-links {
                display: none;
            }

            .hero-content {
                left: 20px;
            }

            .hero-content h1 {
                font-size: 32px;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">
            <div class="logo-box">✶</div>
            MAERSK
        </div>

        <div class="nav-links">
            <span>Prices</span>
            <span>Book</span>
            <span>Schedules</span>
            <span>Tracking</span>
            <span>Manage</span>
            <span>Services</span>
            <span>Company</span>
        </div>

        <div class="actions">
            <button class="register">Register</button>
            <button class="login">Login</button>
        </div>
    </div>

    <section class="hero">
        <img src="https://images.unsplash.com/photo-1509395176047-4a66953fd231" alt="train">

        <div class="hero-content">
            <h1>Intercontinental Rail Transportation</h1>
            <p>Discover our land connection between Asia and Europe via rail.</p>
            <button>Contact us</button>

            <div class="features">
                <span>✔ Fast</span>
                <span>✔ Reliable</span>
                <span>✔ Efficient</span>
            </div>
        </div>

        <div class="bottom-curve"></div>
    </section>

</body>

</html>
