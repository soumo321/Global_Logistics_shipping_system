<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard2</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f8;
      overflow-x: hidden;
    }

    .navbar {
      background: #0077b6;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      animation: slideDown 0.8s ease;
    }
    .navbar h1 {
      margin: 0;
      font-size: 22px;
      animation: fadeInLeft 1s ease;
    }
    .menu-toggle {
      cursor: pointer;
      font-size: 20px;
      display: none;
      transition: transform 0.3s ease;
    }
    .menu-toggle:hover {
      transform: rotate(90deg);
    }

    .sidebar {
      width: 220px;
      background: #023e8a;
      color: white;
      position: fixed;
      top: 60px;
      bottom: 0;
      left: 0;
      padding: 20px;
      transition: transform 0.5s ease;
      animation: fadeInLeft 1s ease;
    }
    .sidebar.hidden {
      transform: translateX(-100%);
    }
    .sidebar h3 {
      margin-top: 0;
      animation: fadeIn 1.2s ease;
    }
    .sidebar ul {
      list-style: none;
      padding: 0;
    }
    .sidebar ul li {
      margin: 15px 0;
      opacity: 0;
      animation: fadeInUp 0.8s forwards;
    }
    .sidebar ul li:nth-child(1) { animation-delay: 0.3s; }
    .sidebar ul li:nth-child(2) { animation-delay: 0.5s; }
    .sidebar ul li:nth-child(3) { animation-delay: 0.7s; }
    .sidebar ul li:nth-child(4) { animation-delay: 0.9s; }
    .sidebar ul li a {
      color: white;
      text-decoration: none;
      transition: color 0.3s, transform 0.3s;
    }
    .sidebar ul li a:hover {
      color: #90e0ef;
      transform: translateX(5px);
    }

    .main {
      margin-left: 240px;
      padding: 20px;
      transition: margin-left 0.3s ease;
      animation: fadeIn 1.2s ease;
    }
    .main.collapsed {
      margin-left: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      animation: zoomIn 0.8s ease;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }
    .card h2 {
      margin: 0 0 10px;
      color: #0077b6;
      animation: fadeInUp 1s ease;
    }
    .card p {
      color: #555;
      animation: fadeIn 1.5s ease;
    }

    @media (max-width: 768px) {
      .menu-toggle {
        display: block;
      }
      .sidebar {
        top: 60px;
        transform: translateX(-100%);
      }
      .sidebar.show {
        transform: translateX(0);
      }
      .main {
        margin-left: 20px;
      }
    }

    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes zoomIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <h1>Dashboard</h1>
    <div class="menu-toggle" id="menu-toggle">&#9776;</div>
  </div>

  <div class="sidebar" id="sidebar">
    <h3>Menu</h3>
    <ul>
      <li><a href="#">Overview</a></li>
      <li><a href="#">Analytics</a></li>
      <li><a href="#">Reports</a></li>
      <li><a href="#">Settings</a></li>
    </ul>
  </div>

  <div class="main" id="main">
    <div class="cards">
      <div class="card">
        <h2>Users</h2>
        <p>1,245 active users</p>
      </div>
      <div class="card">
        <h2>Revenue</h2>
        <p>$12,340 this month</p>
      </div>
      <div class="card">
        <h2>Shipments</h2>
        <p>320 packages delivered</p>
      </div>
      <div class="card">
        <h2>Support Tickets</h2>
        <p>45 open tickets</p>
      </div>
    </div>
  </div>

  <script>
    const menuToggle = document.getElementById("menu-toggle");
    const sidebar = document.getElementById("sidebar");
    const main = document.getElementById("main");

    menuToggle.addEventListener("click", () => {
      sidebar.classList.toggle("show");
      main.classList.toggle("collapsed");
    });
  </script>
</body>
</html>
